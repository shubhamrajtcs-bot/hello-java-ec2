name: Java 8 deployment

on:
    push:
      branches: 
        -main
    workflow_dispatch: #<-- munual trigger
    
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Chaeckout Source
        uses: actions/checkout@v4
      - name: Setup java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8
          chache: maven
      - name: Check Java version
        run : java -version
        
      - name: Build Project
        run: mvn pakage 
      - name: upload artifact
        uses : actions/ upload-artifact@v4
        with:
          name: java-artifact
          path: target/*.jar     
      
